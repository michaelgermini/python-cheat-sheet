<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Cheat Sheet Project - Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=src/pages/index.html">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .loading {
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #444;
            border-top: 4px solid #3776ab;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .link {
            color: #3776ab;
            text-decoration: none;
            font-weight: bold;
        }
        .link:hover {
            color: #ffd43b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐍</div>
        <h1>Python Cheat Sheet Project</h1>
        <p>Redirecting to the main website...</p>
        <div class="loading">
            <div class="spinner"></div>
        </div>
        <p>If you are not redirected automatically, <a href="src/pages/index.html" class="link">click here</a>.</p>
    </div>
</body>
</html>
